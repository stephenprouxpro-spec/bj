<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEAUJEUSTUDIO</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    @font-face {
  font-family: "Neue Haas Grotesk Display Pro";
  src: url("NeueHaasDisplay-Roman.woff") format("woff");
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ---------- Cadre desktop/tablette : taille FIXE ---------- */
    .frame {
      position: relative;
      width: 839px;
      height: 412px;
      flex-shrink: 0;
    }

    .frame__corners {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .frame__corners--mobile { display: none; }

    .frame__content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Row : logo à gauche, nav à droite (space-between) */
    .row {
      display: flex;
      width: 474px;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo {
      display: block;
      height: 20px;
      width: auto;
      flex-shrink: 0;
    }

    .nav {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .nav a {
  color: #000;
  text-align: right;
  font-family: "Neue Haas Grotesk Display Pro", Helvetica, Arial, sans-serif;
  font-size: 12px;
  font-style: normal;
  font-weight: 500;
  line-height: normal;
  text-transform: uppercase;
  text-decoration: none;
}

    .nav a:hover { text-decoration: underline; }

    /* ---------- Mobile : cadre 339×759 ---------- */
    @media (max-width: 768px) {
      .frame {
        width: 339px;
        height: 759px;
      }

      .frame__corners--desktop { display: none; }
      .frame__corners--mobile { display: block; }

      .row {
        flex-direction: column;
        align-items: center;
        width: auto;
        gap: 28px;
      }

      .nav { align-items: center; }
    }
  </style>
</head>
