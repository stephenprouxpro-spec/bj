<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEAUJEUSTUDIO</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #fff;
            color: #000;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* Le cadre intérieur qui contient tout */
        .frame {
            position: absolute;
            top: 18%;
            bottom: 18%;
            left: 28%;
            right: 28%;
        }

        /* Marqueurs de coin en L — placés AUX COINS du cadre intérieur */
        .corner {
            position: absolute;
            width: 16px;
            height: 16px;
        }
        .corner-tl {
            top: 0; left: 0;
            border-top: 1px solid #000;
            border-left: 1px solid #000;
        }
        .corner-tr {
            top: 0; right: 0;
            border-top: 1px solid #000;
            border-right: 1px solid #000;
        }
        .corner-bl {
            bottom: 0; left: 0;
            border-bottom: 1px solid #000;
            border-left: 1px solid #000;
        }
        .corner-br {
            bottom: 0; right: 0;
            border-bottom: 1px solid #000;
            border-right: 1px solid #000;
        }

        /* Contenu centré DANS le cadre */
        .content {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%;
        }

        .logo img {
            height: 22px;
            width: auto;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.08em;
            font-weight: 400;
        }

        .links a {
            color: #000;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .links a:hover {
            opacity: 0.4;
        }

        /* ===== RESPONSIVE TABLET ===== */
        @media (max-width: 1024px) {
            .frame {
                top: 15%;
                bottom: 15%;
                left: 8%;
                right: 8%;
            }
        }

        /* ===== RESPONSIVE MOBILE ===== */
        @media (max-width: 640px) {
            .frame {
                top: 12%;
                bottom: 12%;
                left: 6%;
                right: 6%;
            }

            .corner {
                width: 12px;
                height: 12px;
            }

            .content {
                flex-direction: column;
                gap: 40px;
                padding: 0;
            }

            .logo img {
                height: 20px;
            }

            .links {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="content">
            <div class="logo">
                <img src="logo.svg" alt="BEAUJEUSTUDIO">
            </div>

            <nav class="links">
                <a href="https://instagram.com/TON_USERNAME" target="_blank" rel="noopener">INSTAGRAM</a>
                <a href="mailto:TON_EMAIL@exemple.com">CONTACT</a>
            </nav>
        </div>
    </div>
</body>
</html>
